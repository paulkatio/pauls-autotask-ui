name: CI

on:
  push:
    branches: [master]
  pull_request:

# Build/Typecheck brauchen keine echten Secrets (Autotask-/Entra-Calls passieren
# erst zur Laufzeit). Dummy-Werte verhindern nur, dass Auth.js beim Build meckert.
env:
  AUTH_MODE: mock
  AUTH_SECRET: ci-build-only-dummy-secret-not-used-anywhere

jobs:
  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
