name: CI

on:
  push:
    branches: [master]
  pull_request:

# Build/Typecheck brauchen keine echten Secrets (Autotask-/Entra-Calls passieren
# erst zur Laufzeit). Dummy-Werte verhindern nur, dass Auth.js beim Build meckert.
env:
  AUTH_MODE: mock
  AUTH_SECRET: ci-build-only-dummy-secret-not-used-anywhere

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # next build erzeugt next-env.d.ts und typprüft das Projekt mit (eigener
      # tsc-Lauf) — deckt den Typecheck ab. Ein separater `tsc --noEmit` davor
      # würde an den von Next generierten Bild-Modul-Typen scheitern.
      - name: Build
        run: npm run build
